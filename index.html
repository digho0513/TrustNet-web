<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TrustNet AI</title>

<style>

/* ===== BODY ===== */

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
}

/* ===== HEADER ===== */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
}

.logo{
font-size:22px;
font-weight:bold;
color:#c084fc;
display:flex;
align-items:center;
gap:10px;
}

/* ===== CARDS ===== */

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:12px;
padding:25px;
margin:30px auto;
max-width:400px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* ===== INPUT ===== */

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-top:10px;
background:#1e1b4b;
color:white;
}

/* ===== BUTTON ===== */

button{
background:linear-gradient(45deg,#9333ea,#c084fc);
border:none;
padding:12px 20px;
border-radius:8px;
margin-top:15px;
color:white;
font-weight:bold;
cursor:pointer;
width:100%;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #a855f7;
}

/* ===== RESULT ===== */

.safe{color:#22c55e;font-weight:bold;}
.warn{color:#facc15;font-weight:bold;}
.danger{color:#ef4444;font-weight:bold;}

/* ===== RISK BAR ===== */

.riskbar{
width:100%;
height:18px;
background:#1e1b4b;
border-radius:10px;
margin-top:10px;
}

#riskFill{
height:100%;
width:0%;
background:linear-gradient(90deg,#9333ea,#c084fc);
border-radius:10px;
}

/* ===== DASHBOARD ===== */

.stats{
display:flex;
gap:20px;
flex-wrap:wrap;
margin:20px;
}

.statcard{
flex:1;
min-width:150px;
padding:20px;
border-radius:10px;
background:rgba(255,255,255,0.05);
text-align:center;
}

/* ===== MOBILE ===== */

@media(max-width:768px){

.header{
flex-direction:column;
gap:10px;
}

.stats{
flex-direction:column;
}

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="logo">
<img src="icon.png" width="30">
TrustNet AI
</div>

<div id="username">User</div>

</div>

<!-- LOGIN / REGISTER -->

<div id="authCard" class="card">

<h2>Login / Register</h2>

<input id="fullname" placeholder="Full Name">

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="registerUser()">Register</button>

<button onclick="loginUser()">Login</button>

<p id="authMessage"></p>

</div>

<!-- APP CONTENT -->

<div id="appContent" style="display:none">

<div class="card">

<h3>Scan Message or Link</h3>

<input id="scanInput" placeholder="Paste message or link">

<button onclick="scan()">Scan</button>

<div id="resultText"></div>

<div class="riskbar">
<div id="riskFill"></div>
</div>

</div>

<div class="stats">

<div class="statcard">
<h2 id="totalScans">0</h2>
<p>Total Scans</p>
</div>

<div class="statcard">
<h2 id="threats">0</h2>
<p>Threats Detected</p>
</div>

<div class="statcard">
<h2>92%</h2>
<p>AI Accuracy</p>
</div>

</div>

</div>

<script>

/* ===== SIMPLE AI SCAN ===== */

function scan(){

let text=document.getElementById("scanInput").value.toLowerCase();

let score=0;

let scamWords=["lottery","free money","click here","urgent","bank","password","verify","win","prize"];

scamWords.forEach(word=>{
if(text.includes(word)){score+=15;}
});

if(score>100){score=100;}

showResult(score);

}

/* ===== SHOW RESULT ===== */

function showResult(score){

let label="Safe";
let className="safe";

if(score>70){
label="High Risk";
className="danger";
}
else if(score>40){
label="Suspicious";
className="warn";
}

document.getElementById("resultText").innerHTML =
`<span class="${className}">${label} (${score}% risk)</span>`;

document.getElementById("riskFill").style.width = score+"%";

}

/* ===== REGISTER ===== */

function registerUser(){

let name=document.getElementById("fullname").value;

let email=document.getElementById("email").value;

let password=document.getElementById("password").value;

localStorage.setItem("user",JSON.stringify({name,email,password}));

document.getElementById("authMessage").innerText="Registered Successfully";

}

/* ===== LOGIN ===== */

function loginUser(){

let email=document.getElementById("email").value;

let password=document.getElementById("password").value;

let user=JSON.parse(localStorage.getItem("user"));

if(user && user.email===email && user.password===password){

document.getElementById("authCard").style.display="none";
document.getElementById("appContent").style.display="block";

document.getElementById("username").innerText=user.name;

}

else{
document.getElementById("authMessage").innerText="Invalid Login";
}

}

</script>

</body>
</html>
