<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TrustNet AI Security</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6d28d9">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
align-items:center;
gap:10px;
padding:15px 30px;
background:rgba(0,0,0,0.3);
}

.navbar img{
width:40px;
}

/* HERO */

.hero{
text-align:center;
padding:40px 20px;
}

.hero h1{
font-size:36px;
color:#c084fc;
margin:0;
}

.hero p{
opacity:0.8;
}

/* CONTAINER */

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* CARDS */

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:16px;
padding:25px;
box-shadow:0 8px 30px rgba(0,0,0,0.4);
margin-bottom:25px;
}

/* INPUTS */

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #6d28d9;
background:#1f1b4d;
color:white;
}

input:focus, textarea:focus{
outline:none;
border-color:#a855f7;
}

/* BUTTON */

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#7c3aed,#a855f7);
color:white;
font-weight:bold;
cursor:pointer;
margin-top:8px;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

/* PROGRESS BAR */

.progress{
height:20px;
background:#1e293b;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress-bar{
height:100%;
width:0%;
transition:width 0.8s ease;
border-radius:10px;
}

.low{background:#22c55e;}
.medium{background:#facc15;}
.high{background:#ef4444;}

/* DASHBOARD STATS */

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

.stat-card{
background:#1f1b4d;
padding:20px;
border-radius:12px;
text-align:center;
}

.stat-card h3{
margin:0;
font-size:28px;
}

/* MOBILE */

@media(max-width:768px){

.hero h1{
font-size:28px;
}

.container{
padding:10px;
}

}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
<img src="icon.png">
<strong>TrustNet</strong>
</div>

<!-- HERO -->

<section class="hero">
<h1>🛡 TrustNet AI Security</h1>
<p>AI-powered detection for Fake Accounts & Scam Messages</p>
</section>

<div class="container">

<!-- AUTH -->

<div class="card" id="authCard">

<h2>Login / Register</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="registerUser()">Register</button>

<button onclick="loginUser()">Login</button>

<p id="authMessage"></p>

</div>

<!-- APP -->

<div id="appContent" style="display:none">

<!-- FAKE ACCOUNT -->

<div class="card">

<h2>Fake Account Detector</h2>

<input type="number" id="profile_pic" placeholder="Profile Pic (0 or 1)">
<input type="number" id="username_ratio" placeholder="Username Ratio">
<input type="number" id="fullname_words" placeholder="Fullname Words">
<input type="number" id="description_length" placeholder="Description Length">

<button onclick="analyze()">Analyze</button>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<h3 id="result"></h3>

</div>

<!-- SCAM MESSAGE -->

<div class="card">

<h2>Scam Message Detector</h2>

<textarea id="scamMessage" placeholder="Paste suspicious message here"></textarea>

<button onclick="analyzeScam()">Analyze Message</button>

<div class="progress">
<div class="progress-bar" id="scamProgress"></div>
</div>

<h3 id="scamResult"></h3>

</div>

<!-- DASHBOARD -->

<div class="card">

<h2>My Security Dashboard</h2>

<div class="stats-grid">

<div class="stat-card">
<h3 id="totalScans">0</h3>
<p>Total Scans</p>
</div>

<div class="stat-card">
<h3 id="highRisk">0</h3>
<p>High Risk</p>
</div>

<div class="stat-card">
<h3 id="mediumRisk">0</h3>
<p>Medium Risk</p>
</div>

<div class="stat-card">
<h3 id="lowRisk">0</h3>
<p>Low Risk</p>
</div>

</div>

<button onclick="loadStats()">Refresh Stats</button>
<button onclick="logoutUser()">Logout</button>

</div>

</div>

</div>

<script>

/* SUPABASE */

const SUPABASE_URL="https://gqgautoknzselkoaxxld.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxZ2F1dG9rbnpzZWxrb2F4eGxkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMjYzMjEsImV4cCI6MjA4NzcwMjMyMX0.ITmQ5Sd3kTQpVYbsvElk3U-08m0nFhh2bC13x_7iDD0";

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let currentUser=null;

function sigmoid(x){return 1/(1+Math.exp(-x));}

/* REGISTER */

async function registerUser(){

let email=emailInput();
let password=passwordInput();

const {error}=await supabaseClient.auth.signUp({email,password});

authMessage.innerText=error?error.message:"Registration successful";

}

/* LOGIN */

async function loginUser(){

let email=emailInput();
let password=passwordInput();

const {data,error}=await supabaseClient.auth.signInWithPassword({email,password});

if(error){
authMessage.innerText=error.message;
}
else{
currentUser=data.user;
showApp();
loadStats();
}

}

/* LOGOUT */

async function logoutUser(){
await supabaseClient.auth.signOut();
location.reload();
}

/* INPUT HELPERS */

function emailInput(){return document.getElementById("email").value.trim();}
function passwordInput(){return document.getElementById("password").value.trim();}

/* SHOW APP */

function showApp(){

document.getElementById("authCard").style.display="none";
document.getElementById("appContent").style.display="block";

}

/* FAKE ACCOUNT AI */

async function analyze(){

result.innerHTML="Analyzing...";

let p=parseFloat(profile_pic.value)||0;
let u=parseFloat(username_ratio.value)||0;
let f=parseFloat(fullname_words.value)||0;
let d=parseFloat(description_length.value)||0;

let score=p*-1.2+u*3.4+f*-0.8+d*0.02;

let percent=Math.round(sigmoid(score)*100);

setBar("progressBar",percent);

result.innerHTML=percent+"% Risk";

saveScan("fake_account",percent);

}

/* SCAM DETECTOR */

async function analyzeScam(){

let msg=scamMessage.value.toLowerCase();

let keywords=["urgent","otp","click","login","bitcoin","bank","free","verify","prize"];

let score=0;

keywords.forEach(k=>{
if(msg.includes(k)) score+=12;
});

if(msg.includes("http")) score+=15;

if(score>100) score=100;

setBar("scamProgress",score);

scamResult.innerHTML=score+"% Scam Risk";

saveScan("scam",score);

}

/* BAR COLOR */

function setBar(id,val){

let bar=document.getElementById(id);

bar.style.width=val+"%";

bar.className="progress-bar";

if(val<=40) bar.classList.add("low");
else if(val<=70) bar.classList.add("medium");
else bar.classList.add("high");

}

/* SAVE DATA */

async function saveScan(type,risk){

if(!currentUser) return;

await supabaseClient.from("scans").insert([{
user_id:currentUser.id,
type:type,
risk:risk,
accuracy:100-risk
}]);

}

/* LOAD STATS */

async function loadStats(){

const {data}=await supabaseClient
.from("scans")
.select("*")
.eq("user_id",currentUser.id);

if(!data) return;

let total=data.length;
let high=data.filter(d=>d.risk>70).length;
let medium=data.filter(d=>d.risk>40&&d.risk<=70).length;
let low=data.filter(d=>d.risk<=40).length;

totalScans.innerText=total;
highRisk.innerText=high;
mediumRisk.innerText=medium;
lowRisk.innerText=low;

}

/* SESSION RESTORE */

supabaseClient.auth.getSession().then(({data})=>{

if(data.session){

currentUser=data.session.user;

showApp();

loadStats();

}

});

/* SERVICE WORKER */

if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
