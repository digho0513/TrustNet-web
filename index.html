<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrustNet AI Security</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

header{
  text-align:center;
  padding:20px;
}

header img{
  width:60px;
  margin-bottom:10px;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{opacity:0.85;}

.progress{
  height:20px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.progress-bar{
  height:100%;
  width:0%;
  transition:0.4s;
}

.low{background:#22c55e;}
.medium{background:#facc15;}
.high{background:#ef4444;}
</style>
</head>

<body>

<header>
<img src="icon.png" alt="TrustNet Logo">
<h1>TrustNet AI Security</h1>
</header>

<div class="container">

<div class="card" id="authCard">
<h2>Login / Register</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="registerUser()">Register</button>
<button onclick="loginUser()">Login</button>
<p id="authMessage"></p>
</div>

<div id="appContent" style="display:none;">

<div class="card">
<h2>Fake Account Detector</h2>
<input type="number" id="profile_pic" placeholder="Profile Pic (0 or 1)">
<input type="number" id="username_ratio" placeholder="Username Ratio">
<input type="text" id="fullname_words" placeholder="Fullname Words">
<input type="number" id="description_length" placeholder="Description Length">
<button onclick="analyze()">Analyze</button>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<h3 id="result"></h3>
</div>

<div class="card">
<h2>Scam Message Detector</h2>
<textarea id="scamMessage" placeholder="Paste suspicious message here..."></textarea>
<button onclick="analyzeScam()">Analyze</button>
<div class="progress"><div class="progress-bar" id="scamProgress"></div></div>
<h3 id="scamResult"></h3>
</div>

<div class="card">
<h2>My Statistics</h2>
<div id="stats"></div>
<button onclick="loadStats()">Refresh Stats</button>
<button onclick="logoutUser()">Logout</button>
</div>

</div>
</div>

<script>
const SUPABASE_URL = "https://gqgautoknzselkoaxxld.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxZ2F1dG9rbnpzZWxrb2F4eGxkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMjYzMjEsImV4cCI6MjA4NzcwMjMyMX0.ITmQ5Sd3kTQpVYbsvElk3U-08m0nFhh2bC13x_7iDD0";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

function sigmoid(x){ return 1/(1+Math.exp(-x)); }

// REGISTER
async function registerUser(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    document.getElementById("authMessage").innerText = "Enter email & password";
    return;
  }

  const { error } = await supabaseClient.auth.signUp({ email, password });

  document.getElementById("authMessage").innerText =
    error ? error.message : "Registration successful. Check email if confirmation enabled.";
}

// LOGIN
async function loginUser(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    document.getElementById("authMessage").innerText = "Enter email & password";
    return;
  }

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if(error){
    document.getElementById("authMessage").innerText = error.message;
  } else {
    currentUser = data.user;
    document.getElementById("authCard").style.display = "none";
    document.getElementById("appContent").style.display = "block";
    loadStats();
  }
}

// LOGOUT
async function logoutUser(){
  await supabaseClient.auth.signOut();
  location.reload();
}

// FAKE ACCOUNT
async function analyze(){
  let p = parseFloat(document.getElementById("profile_pic").value) || 0;
  let u = parseFloat(document.getElementById("username_ratio").value) || 0;
  let f = parseFloat(document.getElementById("fullname_words").value) || 0;
  let d = parseFloat(document.getElementById("description_length").value) || 0;

  let score = p*-1.2 + u*3.4 + f*-0.8 + d*0.02;
  let percent = Math.round(sigmoid(score)*100);

  setBar("progressBar", percent);
  document.getElementById("result").innerText = percent + "% Risk";

  saveScan("fake_account", percent);
}

// SCAM MESSAGE
async function analyzeScam(){
  let msg = document.getElementById("scamMessage").value.toLowerCase();
  let keywords=["urgent","otp","click","login","bitcoin","bank","free","prize","verify"];
  let score=0;

  keywords.forEach(w=>{ if(msg.includes(w)) score+=12; });
  if(msg.includes("http")) score+=15;
  if(score>100) score=100;

  setBar("scamProgress", score);
  document.getElementById("scamResult").innerText = score + "% Scam Risk";

  saveScan("scam", score);
}

// SAVE SCAN
async function saveScan(type, risk){
  if(!currentUser) return;

  await supabaseClient.from('scans').insert([{
    user_id: currentUser.id,
    type: type,
    risk: risk,
    accuracy: 100 - risk
  }]);
}

// PROGRESS BAR COLOR
function setBar(id, value){
  let bar = document.getElementById(id);
  bar.style.width = value + "%";
  bar.className = "progress-bar";

  if(value <= 40) bar.classList.add("low");
  else if(value <= 70) bar.classList.add("medium");
  else bar.classList.add("high");
}

// LOAD STATS
async function loadStats(){
  const { data } = await supabaseClient
    .from('scans')
    .select('*')
    .eq('user_id', currentUser.id);

  if(!data) return;

  let total=data.length;
  let high=data.filter(d=>d.risk>70).length;
  let medium=data.filter(d=>d.risk>40 && d.risk<=70).length;
  let low=data.filter(d=>d.risk<=40).length;

  let accuracy = total ?
    (data.reduce((a,b)=>a+b.accuracy,0)/total).toFixed(2)
    : 0;

  document.getElementById("stats").innerHTML =
    "Total Scans: "+total+"<br>"+
    "High Risk: "+high+"<br>"+
    "Medium Risk: "+medium+"<br>"+
    "Low Risk: "+low+"<br>"+
    "Average Accuracy: "+accuracy+"%";
}

// SESSION RESTORE
supabaseClient.auth.getSession().then(({data})=>{
  if(data && data.session){
    currentUser = data.session.user;
    document.getElementById("authCard").style.display = "none";
    document.getElementById("appContent").style.display = "block";
    loadStats();
  }
});
// SERVICE WORKER
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
