<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TrustNet AI Security</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#12082b">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#1a0933,#070312);
color:white;
}

/* HEADER */

header{
text-align:center;
padding:30px;
}

header img{
width:70px;
margin-bottom:10px;
}

header h1{
margin:5px;
font-size:30px;
color:#c084fc;
}

header p{
opacity:0.7;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:800px){
.grid{
grid-template-columns:1fr;
}
}

/* CARD */

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:18px;
padding:25px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 10px 35px rgba(0,0,0,0.6);
}

/* INPUT */

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
background:#12082b;
color:white;
outline:none;
}

input:focus,textarea:focus{
box-shadow:0 0 0 2px #9333ea;
}

/* BUTTON */

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#7c3aed,#c084fc);
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
transform:scale(1.02);
}

/* PROGRESS */

.progress{
height:18px;
background:#1b1035;
border-radius:20px;
overflow:hidden;
margin-top:15px;
}

.progress-bar{
height:100%;
width:0%;
transition:0.5s;
}

/* COLORS */

.low{background:#22c55e;}
.medium{background:#facc15;}
.high{background:#ef4444;}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:15px;
}

.statbox{
background:rgba(255,255,255,0.04);
border-radius:12px;
padding:18px;
text-align:center;
}

.statbox h3{
margin:0;
font-size:26px;
color:#c084fc;
}

.statbox p{
margin:5px 0 0;
opacity:0.7;
}

</style>
</head>

<body>

<header>
<img src="icon.png">
<h1>TrustNet AI Security</h1>
<p>AI Powered Scam & Fake Account Detection</p>
</header>

<div class="container">

<!-- LOGIN -->

<div class="card" id="authCard">

<h2>Login / Register</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="registerUser()">Register</button>

<button onclick="loginUser()">Login</button>

<p id="authMessage"></p>

</div>


<!-- APP -->

<div id="appContent" style="display:none;">

<div class="grid">

<!-- FAKE ACCOUNT -->

<div class="card">

<h2>Fake Account Detector</h2>

<input type="number" id="profile_pic" placeholder="Profile Pic (0 or 1)">

<input type="number" id="username_ratio" placeholder="Username Ratio">

<input type="number" id="fullname_words" placeholder="Fullname Words">

<input type="number" id="description_length" placeholder="Description Length">

<button onclick="analyze()">Analyze</button>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<h3 id="result"></h3>

</div>


<!-- SCAM DETECTOR -->

<div class="card">

<h2>Scam Message Detector</h2>

<textarea id="scamMessage" placeholder="Paste suspicious message"></textarea>

<button onclick="analyzeScam()">Analyze</button>

<div class="progress">
<div class="progress-bar" id="scamProgress"></div>
</div>

<h3 id="scamResult"></h3>

</div>

</div>


<!-- STATS -->

<div class="card">

<h2>My Statistics</h2>

<div class="stats" id="stats"></div>

<button onclick="loadStats()">Refresh Stats</button>

<button onclick="logoutUser()">Logout</button>

</div>

</div>

</div>


<script>

const SUPABASE_URL="https://gqgautoknzselkoaxxld.supabase.co"

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxZ2F1dG9rbnpzZWxrb2F4eGxkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMjYzMjEsImV4cCI6MjA4NzcwMjMyMX0.ITmQ5Sd3kTQpVYbsvElk3U-08m0nFhh2bC13x_7iDD0"

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let currentUser=null

function sigmoid(x){
return 1/(1+Math.exp(-x))
}

/* REGISTER */

async function registerUser(){

const email=document.getElementById("email").value.trim()

const password=document.getElementById("password").value.trim()

const {error}=await supabaseClient.auth.signUp({email,password})

authMessage.innerText=error?error.message:"Registration successful"

}


/* LOGIN */

async function loginUser(){

const email=document.getElementById("email").value.trim()

const password=document.getElementById("password").value.trim()

const {data,error}=await supabaseClient.auth.signInWithPassword({email,password})

if(error){

authMessage.innerText=error.message

}else{

currentUser=data.user

authCard.style.display="none"

appContent.style.display="block"

loadStats()

}

}


/* LOGOUT */

async function logoutUser(){

await supabaseClient.auth.signOut()

location.reload()

}


/* FAKE ACCOUNT */

async function analyze(){

let p=parseFloat(profile_pic.value)||0

let u=parseFloat(username_ratio.value)||0

let f=parseFloat(fullname_words.value)||0

let d=parseFloat(description_length.value)||0

let score=p*-1.2+u*3.4+f*-0.8+d*0.02

let percent=Math.round(sigmoid(score)*100)

setBar("progressBar",percent)

result.innerText=percent+"% Risk"

saveScan("fake_account",percent)

}


/* SCAM DETECTION */

async function analyzeScam(){

let msg=scamMessage.value.toLowerCase()

let keywords=["urgent","otp","click","login","bitcoin","bank","free","prize","verify"]

let score=0

keywords.forEach(w=>{if(msg.includes(w))score+=12})

if(msg.includes("http"))score+=15

if(score>100)score=100

setBar("scamProgress",score)

scamResult.innerText=score+"% Scam Risk"

saveScan("scam",score)

}


/* SAVE */

async function saveScan(type,risk){

if(!currentUser)return

await supabaseClient.from('scans').insert([{

user_id:currentUser.id,

type:type,

risk:risk,

accuracy:100-risk

}])

}


/* PROGRESS */

function setBar(id,value){

let bar=document.getElementById(id)

bar.style.width=value+"%"

bar.className="progress-bar"

if(value<=40)bar.classList.add("low")

else if(value<=70)bar.classList.add("medium")

else bar.classList.add("high")

}


/* STATS */

async function loadStats(){

const {data}=await supabaseClient

.from('scans')

.select('*')

.eq('user_id',currentUser.id)

if(!data)return

let total=data.length

let high=data.filter(d=>d.risk>70).length

let medium=data.filter(d=>d.risk>40&&d.risk<=70).length

let low=data.filter(d=>d.risk<=40).length

stats.innerHTML=`

<div class="statbox"><h3>${total}</h3><p>Total Scans</p></div>

<div class="statbox"><h3>${high}</h3><p>High Risk</p></div>

<div class="statbox"><h3>${medium}</h3><p>Medium Risk</p></div>

<div class="statbox"><h3>${low}</h3><p>Low Risk</p></div>

`

}


/* SESSION RESTORE */

supabaseClient.auth.getSession().then(({data})=>{

if(data.session){

currentUser=data.session.user

authCard.style.display="none"

appContent.style.display="block"

loadStats()

}

})


/* SERVICE WORKER */

if('serviceWorker' in navigator){

navigator.serviceWorker.register('service-worker.js')

}

</script>

</body>
</html>
